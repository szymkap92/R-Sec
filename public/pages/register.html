<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R-SEC - Rejestracja</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Varela+Round:wght@400&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--cyber-gradient);
            position: relative;
            overflow: hidden;
        }

        .register-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 98px,
                var(--red-glow) 100px
            );
            opacity: 0.05;
            animation: scan 3s linear infinite;
        }

        .register-form-container {
            background: var(--bg-dark);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: var(--shadow-dark);
            border: 1px solid var(--secondary-color);
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 2;
        }

        .register-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-logo img {
            max-width: 80px;
            height: auto;
            filter: drop-shadow(0 0 10px var(--secondary-color));
        }

        .register-logo h1 {
            color: var(--white);
            font-size: 1.8rem;
            margin: 1rem 0 0.5rem 0;
            text-shadow: 0 0 10px var(--secondary-color);
        }

        .register-subtitle {
            color: var(--text-light);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group label {
            display: block;
            color: var(--white);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #333;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
            background: var(--bg-darker);
            color: var(--text-color);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 10px var(--red-glow);
        }

        .register-btn {
            width: 100%;
            padding: 15px;
            background: var(--secondary-color);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .register-btn:hover {
            background: #cc0000;
            box-shadow: 0 0 20px var(--red-glow);
            transform: translateY(-2px);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid var(--secondary-color);
            color: var(--secondary-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #22c55e;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .back-to-login {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-to-login a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-to-login a:hover {
            color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-form-container">
            <div class="register-logo">
                <img src="../assets/images/logos/logo.gif" alt="R-SEC Logo">
                <h1>R-SEC</h1>
            </div>
            <p class="register-subtitle">Utwórz nowe konto w systemie</p>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Imię:</label>
                        <input type="text" id="firstName" name="first_name" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Nazwisko:</label>
                        <input type="text" id="lastName" name="last_name" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="username">Nazwa użytkownika:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Hasło:</label>
                    <input type="password" id="password" name="password" required minlength="8">
                    <small style="color: var(--text-light); font-size: 0.8rem;">Minimum 8 znaków</small>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Potwierdź hasło:</label>
                    <input type="password" id="confirmPassword" name="confirm_password" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Telefon (opcjonalne):</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="form-group">
                        <label for="company">Firma (opcjonalne):</label>
                        <input type="text" id="company" name="company">
                    </div>
                </div>
                
                <button type="submit" class="register-btn">Zarejestruj się</button>
            </form>
            
            <div class="back-to-login">
                <a href="login.html">← Masz już konto? Zaloguj się</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const submitBtn = e.target.querySelector('.register-btn');
            
            // Hide previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Get form data
            const formData = new FormData(e.target);
            const registerData = {
                username: formData.get('username'),
                email: formData.get('email'),
                password: formData.get('password'),
                confirm_password: formData.get('confirm_password'),
                first_name: formData.get('first_name'),
                last_name: formData.get('last_name'),
                phone: formData.get('phone'),
                company: formData.get('company')
            };
            
            // Validate passwords match
            if (registerData.password !== registerData.confirm_password) {
                errorDiv.innerHTML = 'Hasła nie są identyczne';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Show loading state
            submitBtn.innerHTML = 'Rejestracja...';
            submitBtn.disabled = true;
            
            try {
                console.log('Wysyłanie żądania rejestracji:', registerData);
                
                const response = await fetch('/RSec/backend/api/auth/register.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(registerData)
                });
                
                console.log('Response status:', response.status);
                
                const responseText = await response.text();
                console.log('Raw response:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    throw new Error('Nieprawidłowa odpowiedź serwera: ' + responseText);
                }
                
                console.log('Parsed data:', data);
                
                if (data.success) {
                    successDiv.innerHTML = data.message || 'Konto utworzone pomyślnie!';
                    successDiv.style.display = 'block';
                    
                    // Reset form
                    e.target.reset();
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                    
                } else {
                    errorDiv.innerHTML = data.message || 'Błąd podczas rejestracji';
                    errorDiv.style.display = 'block';
                }
                
            } catch (error) {
                console.error('Registration error:', error);
                errorDiv.innerHTML = 'Wystąpił błąd podczas rejestracji. Spróbuj ponownie.';
                errorDiv.style.display = 'block';
            } finally {
                // Reset button
                submitBtn.innerHTML = 'Zarejestruj się';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
