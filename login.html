<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R-SEC - Logowanie</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Varela+Round:wght@400&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--cyber-gradient);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 98px,
                var(--red-glow) 100px
            );
            opacity: 0.05;
            animation: scan 3s linear infinite;
        }

        .login-form-container {
            background: var(--bg-dark);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: var(--shadow-dark);
            border: 1px solid var(--secondary-color);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 2;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo img {
            max-width: 80px;
            height: auto;
            filter: drop-shadow(0 0 10px var(--secondary-color));
        }

        .login-logo h1 {
            color: var(--white);
            font-size: 1.8rem;
            margin: 1rem 0 0.5rem 0;
            text-shadow: 0 0 10px var(--secondary-color);
        }

        .login-subtitle {
            color: var(--text-light);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--white);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #333;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
            background: var(--bg-darker);
            color: var(--text-color);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 10px var(--red-glow);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--secondary-color);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            background: #cc0000;
            box-shadow: 0 0 20px var(--red-glow);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid var(--secondary-color);
            color: var(--secondary-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #22c55e;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .back-to-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-to-home a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-to-home a:hover {
            color: var(--secondary-color);
        }

        .role-info {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--secondary-color);
        }

        .role-info h4 {
            color: var(--secondary-color);
            margin: 0 0 0.5rem 0;
            font-size: 0.9rem;
        }

        .role-info p {
            color: var(--text-light);
            margin: 0;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        .demo-accounts {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .demo-accounts strong {
            color: var(--secondary-color);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-form-container {
                padding: 2rem 1.5rem;
                margin: 1rem;
                max-width: none;
            }

            .login-logo h1 {
                font-size: 1.5rem;
            }

            .form-group input,
            .form-group select {
                padding: 15px 18px;
                font-size: 1rem;
            }

            .login-btn {
                padding: 18px;
                font-size: 1.1rem;
            }

            .role-info {
                margin-top: 1.5rem;
                padding: 0.8rem;
            }

            .demo-accounts {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 1rem 0.5rem;
            }

            .login-form-container {
                padding: 1.5rem 1rem;
                border-radius: 10px;
            }

            .login-logo img {
                max-width: 60px;
            }

            .login-logo h1 {
                font-size: 1.3rem;
            }

            .login-subtitle {
                font-size: 0.85rem;
            }

            .form-group input,
            .form-group select {
                padding: 12px 15px;
                font-size: 0.95rem;
            }

            .login-btn {
                padding: 15px;
                font-size: 1rem;
            }

            .role-info h4 {
                font-size: 0.85rem;
            }

            .demo-accounts {
                font-size: 0.75rem;
            }

            .back-to-home a {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form-container">
            <div class="login-logo">
                <img src="R-Sec/logo.gif" alt="R-SEC Logo">
                <h1>R-SEC</h1>
            </div>
            <p class="login-subtitle">Zaloguj się do systemu</p>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Hasło:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="login-btn">Zaloguj się</button>
            </form>
            
            <div class="back-to-home">
                <a href="platform-elearning.html">← Powrót do R-SEC Academy</a>
            </div>
            
            <div class="role-info">
                <h4>Testowe konta:</h4>
                <div class="demo-accounts">
                    <p><strong>Administrator:</strong> admin@r-sec.pl / admin123</p>
                    <p><strong>Pracownik:</strong> employee@r-sec.pl / employee123</p>
                    <p><strong>Użytkownik zewnętrzny:</strong> external@example.com / external123</p>
                    <p style="color: #22c55e; margin-top: 10px; font-size: 0.7rem;">✅ Hasła zaktualizowane - system gotowy do testowania</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const submitBtn = e.target.querySelector('.login-btn');
            
            // Hide previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Show loading state
            submitBtn.innerHTML = 'Logowanie...';
            submitBtn.disabled = true;
            
            const formData = new FormData(e.target);
            const loginData = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            try {
                console.log('Wysyłanie żądania logowania:', loginData);
                
                const response = await fetch('/RSec/backend/api/auth/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const responseText = await response.text();
                console.log('Raw response:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    throw new Error('Nieprawidłowa odpowiedź serwera: ' + responseText);
                }
                
                console.log('Parsed data:', data);
                
                if (data.success) {
                    successDiv.innerHTML = data.message || 'Zalogowano pomyślnie!';
                    successDiv.style.display = 'block';
                    
                    // Redirect based on user role
                    setTimeout(() => {
                        switch(data.user.role) {
                            case 'admin':
                                window.location.href = 'admin-panel.html';
                                break;
                            case 'employee':
                                window.location.href = 'employee-panel.html';
                                break;
                            case 'external':
                                window.location.href = 'platform-elearning.html';
                                break;
                            default:
                                window.location.href = 'platform-elearning.html';
                        }
                    }, 1500);
                    
                } else {
                    errorDiv.innerHTML = data.message || 'Błąd podczas logowania';
                    errorDiv.style.display = 'block';
                }
                
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.innerHTML = 'Wystąpił błąd podczas logowania. Spróbuj ponownie.';
                errorDiv.style.display = 'block';
            } finally {
                // Reset button
                submitBtn.innerHTML = 'Zaloguj się';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
